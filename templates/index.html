<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signup Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .card-img-top { object-fit: cover; height: 200px; }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <h1 class="mb-4">Signup Form</h1>

      <form method="post" enctype="multipart/form-data" class="mb-5">
        <div class="mb-3">
          <label class="form-label">Photo</label>
          <input class="form-control" type="file" name="photo" accept="image/*">
        </div>
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input class="form-control" type="text" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Mobile</label>
          <input class="form-control" type="text" name="mobile">
        </div>
        <div class="mb-3">
          <label class="form-label">Address</label>
          <textarea class="form-control" name="address" rows="3"></textarea>
        </div>
        <button class="btn btn-primary" type="submit">Sign Up</button>
      </form>

      <div class="row">
        {% for user in users %}
        <div class="col-md-4 mb-4">
          <div class="card h-100">
            {% if user.photo %}
            <img src="{{ url_for('static', filename='uploads/' ~ user.photo) }}" class="card-img-top" alt="photo">
            {% else %}
            <svg class="bd-placeholder-img card-img-top" width="100%" height="200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placeholder" preserveAspectRatio="xMidYMid slice" focusable="false"><title>No photo</title><rect width="100%" height="100%" fill="#868e96"></rect><text x="50%" y="50%" fill="#dee2e6" dy=".3em" text-anchor="middle">No photo</text></svg>
            {% endif %}
            <div class="card-body">
              <h5 class="card-title">{{ user.name }}</h5>
              <p class="card-text"><strong>Mobile:</strong> {{ user.mobile or '—' }}</p>
              <p class="card-text"><strong>Address:</strong> {{ user.address or '—' }}</p>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
